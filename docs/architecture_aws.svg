<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">GrantStack AWS Architecture</title>
  <desc id="desc">Executive-readable serverless request flow for the GrantStack AWS backend.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
    <style>
      .title{font:700 54px Arial,sans-serif;fill:#232f3e}.sub{font:26px Arial,sans-serif;fill:#4b5563}.cluster{fill:#f8fafc;stroke:#cbd5e1;stroke-width:3}.node{fill:#fff;stroke:#ff9900;stroke-width:4}.label{font:700 23px Arial,sans-serif;fill:#232f3e}.small{font:20px Arial,sans-serif;fill:#4b5563}.edge{stroke:#4b5563;stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:10 10}.aws{font:700 15px Arial,sans-serif;fill:#ff9900}.note{font:18px Arial,sans-serif;fill:#64748b}
    </style>
  </defs>
  <rect width="1800" height="1050" fill="white"/>
  <text x="60" y="90" class="title">GrantStack AWS Architecture</text>
  <text x="62" y="132" class="sub">Serverless grant-intelligence workflow: accept fast, process async, store source-backed private reports.</text>

  <rect x="430" y="185" width="560" height="680" rx="34" class="cluster"/>
  <text x="455" y="225" class="small">AWS serverless API</text>
  <rect x="1025" y="185" width="330" height="680" rx="34" class="cluster"/>
  <text x="1050" y="225" class="small">Data and catalog</text>
  <rect x="1390" y="185" width="330" height="680" rx="34" class="cluster"/>
  <text x="1415" y="225" class="small">Security and operations</text>

  <rect x="90" y="330" width="260" height="125" rx="24" class="node"/>
  <text x="116" y="377" class="label">Cloudflare Pages</text>
  <text x="116" y="410" class="small">Static frontend</text>

  <rect x="485" y="300" width="220" height="120" rx="24" class="node"/>
  <text x="510" y="345" class="aws">AWS</text>
  <text x="510" y="376" class="label">API Gateway</text>
  <text x="510" y="405" class="small">HTTP API</text>

  <rect x="745" y="260" width="210" height="105" rx="22" class="node"/>
  <text x="770" y="302" class="label">Ingest Lambda</text>
  <text x="770" y="332" class="small">Validate + queue</text>

  <rect x="745" y="420" width="210" height="105" rx="22" class="node"/>
  <text x="770" y="462" class="label">Report Lambda</text>
  <text x="770" y="492" class="small">Tokenized read</text>

  <rect x="745" y="580" width="210" height="105" rx="22" class="node"/>
  <text x="770" y="622" class="label">Analytics Lambda</text>
  <text x="770" y="652" class="small">Event capture</text>

  <rect x="485" y="710" width="220" height="105" rx="22" class="node"/>
  <text x="510" y="752" class="label">SQS Queue</text>
  <text x="510" y="782" class="small">with DLQ</text>

  <rect x="745" y="710" width="210" height="105" rx="22" class="node"/>
  <text x="770" y="752" class="label">Processor</text>
  <text x="770" y="782" class="small">Async worker</text>

  <rect x="1075" y="280" width="230" height="110" rx="22" class="node"/>
  <text x="1100" y="323" class="label">DynamoDB</text>
  <text x="1100" y="353" class="small">Projects table</text>

  <rect x="1075" y="575" width="230" height="110" rx="22" class="node"/>
  <text x="1100" y="618" class="label">DynamoDB</text>
  <text x="1100" y="648" class="small">Analytics table</text>

  <rect x="1075" y="725" width="230" height="110" rx="22" class="node"/>
  <text x="1100" y="768" class="label">S3 Catalog</text>
  <text x="1100" y="798" class="small">Versioned/private</text>

  <rect x="1425" y="270" width="240" height="105" rx="22" class="node"/>
  <text x="1450" y="312" class="label">CloudWatch</text>
  <text x="1450" y="342" class="small">Logs + alarms</text>

  <rect x="1425" y="430" width="240" height="105" rx="22" class="node"/>
  <text x="1450" y="472" class="label">X-Ray</text>
  <text x="1450" y="502" class="small">Tracing</text>

  <rect x="1425" y="590" width="240" height="105" rx="22" class="node"/>
  <text x="1450" y="632" class="label">IAM</text>
  <text x="1450" y="662" class="small">Least privilege</text>

  <rect x="1425" y="750" width="240" height="105" rx="22" class="node"/>
  <text x="1450" y="792" class="label">Secrets Manager</text>
  <text x="1450" y="822" class="small">Optional provider keys</text>

  <path class="edge" d="M350 392H485"/>
  <path class="edge" d="M705 360H745"/>
  <path class="edge" d="M955 313H1075"/>
  <path class="edge" d="M705 762H745"/>
  <path class="edge" d="M955 762H1075"/>
  <path class="edge" d="M955 760C1030 760 1030 335 1075 335"/>
  <path class="edge" d="M485 405C430 405 430 762 485 762"/>
  <path class="edge" d="M595 420V710"/>
  <path class="edge" d="M705 365C725 365 725 472 745 472"/>
  <path class="edge" d="M955 472C1015 472 1015 335 1075 335"/>
  <path class="edge" d="M705 365C725 365 725 632 745 632"/>
  <path class="edge" d="M955 632H1075"/>
  <path class="edge dash" d="M955 762C1190 762 1190 803 1425 803"/>
  <path class="edge dash" d="M955 313C1210 313 1210 322 1425 322"/>
  <path class="edge dash" d="M955 472C1210 472 1210 482 1425 482"/>
  <path class="edge dash" d="M955 632C1210 632 1210 642 1425 642"/>

  <text x="510" y="900" class="note">Render the AWS-icon version with: python docs/architecture_aws.py</text>
</svg>
