name: Validate GrantStack

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/validate.yml"
  push:
    paths:
      - "**"
      - ".github/workflows/validate.yml"

jobs:
  validate-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=grantstack-backend/terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=grantstack-backend/terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=grantstack-backend/terraform validate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Lambda handlers
        run: python -m py_compile grantstack-backend/lambda/ingest_handler.py grantstack-backend/lambda/processor_handler.py grantstack-backend/lambda/report_handler.py grantstack-backend/lambda/source_refresh_handler.py grantstack-backend/lambda/analytics_handler.py grantstack-backend/scripts/sync_vector_index.py

      - name: Install Python test dependencies
        run: python -m pip install boto3

      - name: Run handler tests
        run: python -m unittest discover -s grantstack-backend/tests
