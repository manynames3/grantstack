name: Validate GrantStack Backend

on:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/validate.yml"
  push:
    paths:
      - "**"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Lambda handlers
        run: python -m py_compile lambda/ingest_handler.py lambda/processor_handler.py lambda/report_handler.py lambda/source_refresh_handler.py

      - name: Install Python test dependencies
        run: python -m pip install boto3

      - name: Run handler tests
        run: python -m unittest discover -s tests
